<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/png" href="meridian-logo.png">
  <link rel="apple-touch-icon" href="meridian-logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<title>The Meridian — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#e8e2d8;--parchment:#16130f;--gold:#c9a84c;--gold-light:#dfc278;--muted:#8a8278;--rule:#2e2a24;--card-bg:#1e1a15}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--parchment);color:var(--ink);font-family:'Jost',sans-serif;font-weight:400;line-height:1.8;font-size:15px}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.6}
  .page{max-width:860px;margin:0 auto;padding:48px 32px 80px;position:relative;z-index:1}
  @media(max-width:600px){.page{padding:32px 18px 80px}}
  .admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px;flex-wrap:wrap;gap:14px}
  .admin-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;letter-spacing:.08em}
  .admin-title em{font-style:italic;color:var(--gold)}
  .admin-subtitle{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:4px}
  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:36px}
  @media(max-width:600px){.stat-row{grid-template-columns:1fr 1fr}}
  .stat-card{background:var(--card-bg);border:1px solid var(--rule);border-radius:8px;padding:16px 18px}
  .stat-label{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .stat-val{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:var(--ink)}
  .stat-card.flagged .stat-val{color:#c9844c}
  .tabs{display:flex;gap:0;border-bottom:1px solid var(--rule);margin-bottom:28px}
  .tab{font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);background:none;border:none;padding:12px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold)}
  .tab-panel{display:none}.tab-panel.active{display:block}
  .section-label{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;display:block;font-weight:500}
  table{width:100%;border-collapse:collapse;font-size:.84rem}
  th{text-align:left;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:8px 12px;border-bottom:1px solid var(--rule)}
  td{padding:12px 12px;border-bottom:1px solid var(--rule);color:#b8b0a4;vertical-align:top}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(255,255,255,.02)}
  .badge{display:inline-block;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;padding:2px 8px;border-radius:10px;font-weight:500}
  .badge.flagged{background:rgba(138,80,48,.2);color:#c9844c;border:1px solid rgba(138,80,48,.3)}
  .badge.approved{background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.25)}
  .badge.banned{background:rgba(180,40,40,.15);color:#c06050;border:1px solid rgba(180,40,40,.25)}
  .post-preview{font-size:.82rem;color:#9a9288;max-width:320px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .action-row{display:flex;gap:8px;flex-wrap:wrap}
  .btn{font-family:'Jost',sans-serif;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;border-radius:5px;padding:6px 14px;cursor:pointer;border:1px solid;transition:all .2s}
  .btn-approve{color:var(--gold);border-color:rgba(201,168,76,.4);background:transparent}.btn-approve:hover{background:rgba(201,168,76,.1)}
  .btn-restore{color:#8ab090;border-color:rgba(100,160,120,.4);background:transparent}.btn-restore:hover{background:rgba(100,160,120,.1)}
  .btn-remove{color:#c08050;border-color:rgba(138,80,48,.35);background:transparent}.btn-remove:hover{background:rgba(138,80,48,.12)}
  .btn-ban{color:#c06050;border-color:rgba(180,40,40,.35);background:transparent}.btn-ban:hover{background:rgba(180,40,40,.1)}
  .btn-unban{color:#8ab090;border-color:rgba(100,160,120,.4);background:transparent}.btn-unban:hover{background:rgba(100,160,120,.1)}
  .btn-primary-sm{font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;border-radius:6px;padding:11px 24px;cursor:pointer;border:none;background:var(--gold);color:#16130f;font-weight:500;transition:background .2s}
  .btn-primary-sm:hover{background:var(--gold-light)}
  .btn-ghost-sm{font-family:'Jost',sans-serif;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;border-radius:6px;padding:9px 18px;cursor:pointer;background:transparent;color:var(--gold);border:1px solid rgba(201,168,76,.4);transition:all .2s}
  .btn-ghost-sm:hover{background:rgba(201,168,76,.08)}
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
  .login-card{background:var(--card-bg);border:1px solid var(--rule);border-radius:12px;padding:36px 40px;width:100%;max-width:380px}
  .login-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-style:italic;color:var(--ink);margin-bottom:6px;text-align:center}
  .login-sub{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:28px}
  .field-group{margin-bottom:14px}
  .field-label{font-size:.7rem;font-weight:500;color:var(--ink);display:block;margin-bottom:5px;letter-spacing:.08em;text-transform:uppercase}
  input[type=email],input[type=password]{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--rule);border-radius:6px;color:var(--ink);font-family:'Jost',sans-serif;font-weight:300;font-size:.9rem;padding:10px 14px;transition:border-color .2s;outline:none}
  input:focus{border-color:var(--gold)}
  .msg{font-size:.8rem;padding:9px 13px;border-radius:6px;margin-top:10px;display:none}
  .msg.error{background:rgba(138,80,48,.12);color:#c08050;border:1px solid rgba(138,80,48,.3)}
  .msg.show{display:block}
  .empty{text-align:center;padding:36px;color:var(--muted);font-family:'Cormorant Garamond',serif;font-style:italic;border:1px dashed var(--rule);border-radius:8px;font-size:.95rem}
  .passion-cell{font-family:'Cormorant Garamond',serif;font-style:italic;color:#a09890;font-size:.84rem}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-wrap" id="login-screen">
  <div class="login-card">
    <div class="login-title">The Meridian</div>
    <div class="login-sub">Admin Access</div>
    <div class="field-group"><label class="field-label" for="a-email">Email</label><input type="email" id="a-email" placeholder="admin@email.com"></div>
    <div class="field-group"><label class="field-label" for="a-pass">Password</label><input type="password" id="a-pass" placeholder="••••••••"></div>
    <div class="msg error" id="login-err"></div>
    <button class="btn-primary-sm" style="width:100%;margin-top:10px" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="page" id="admin-panel" style="display:none">
  <div class="admin-header">
    <div>
      <div class="admin-title">The <em>Meridian</em> — Admin</div>
      <div class="admin-subtitle">Community Management</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <span style="font-size:.75rem;color:var(--muted)" id="admin-email-label"></span>
      <button class="btn-ghost-sm" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stat-row" id="stats">
    <div class="stat-card"><div class="stat-label">Total Posts</div><div class="stat-val" id="s-total">—</div></div>
    <div class="stat-card flagged"><div class="stat-label">Flagged</div><div class="stat-val" id="s-flagged">—</div></div>
    <div class="stat-card"><div class="stat-label">Members</div><div class="stat-val" id="s-users">—</div></div>
    <div class="stat-card"><div class="stat-label">Banned</div><div class="stat-val" id="s-banned">—</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('flagged')">Flagged Posts</button>
    <button class="tab" onclick="switchTab('all-posts')">All Posts</button>
    <button class="tab" onclick="switchTab('users')">Members</button>
  </div>

  <!-- Flagged -->
  <div class="tab-panel active" id="tab-flagged">
    <span class="section-label">Posts reported by users — hidden pending your review</span>
    <div id="flagged-list"><div class="empty">Loading...</div></div>
  </div>

  <!-- All posts -->
  <div class="tab-panel" id="tab-all-posts">
    <span class="section-label">All approved visible posts</span>
    <div id="all-posts-list"><div class="empty">Loading...</div></div>
  </div>

  <!-- Users -->
  <div class="tab-panel" id="tab-users">
    <span class="section-label">Registered community members</span>
    <div id="users-list"><div class="empty">Loading...</div></div>
  </div>
</div>

<script type="module">
const ADMIN_EMAIL = atob('YXJjaGl0ZWN0bWVyaWRpYW5Ab3V0bG9vay5jb20='); // encoded — do not replace with plain text

import { auth, db } from './meridian-firebase.js';
import { signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, getDocs, doc, updateDoc, query, orderBy, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let currentTab = 'flagged';

onAuthStateChanged(auth, async u => {
  if(u && u.email === ADMIN_EMAIL){
    el('login-screen').style.display='none';
    el('admin-panel').style.display='block';
    el('admin-email-label').textContent=u.email;
    await loadAll();
  } else if(u && u.email !== ADMIN_EMAIL){
    await signOut(auth);
    showErr(el('login-err'),'Access denied. Admin only.');
  }
});

function doLogin(){
  const em=v('a-email'),pw=v('a-pass'),err=el('login-err');
  err.classList.remove('show');
  if(!em||!pw) return showErr(err,'Please enter your email and password.');
  signInWithEmailAndPassword(auth,em,pw).catch(e=>{
    showErr(err,(e.code==='auth/wrong-password'||e.code==='auth/user-not-found')
      ?'Incorrect email or password.':'Something went wrong. Please try again.');
  });
}

function doLogout(){
  signOut(auth).then(()=>{
    el('login-screen').style.display='flex';
    el('admin-panel').style.display='none';
  });
}

function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach((e,i)=>{
    e.classList.toggle('active',['flagged','all-posts','users'][i]===t);
  });
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  el('tab-'+t).classList.add('active');
}

async function loadAll(){
  await Promise.all([loadFlagged(),loadAllPosts(),loadUsers(),loadStats()]);
}

async function loadStats(){
  try{
    const [posts,users]=await Promise.all([getDocs(collection(db,'posts')),getDocs(collection(db,'users'))]);
    const flagged=posts.docs.filter(d=>d.data().reported&&d.data().hidden).length;
    const banned=users.docs.filter(d=>d.data().banned).length;
    el('s-total').textContent=posts.size;
    el('s-flagged').textContent=flagged;
    el('s-users').textContent=users.size;
    el('s-banned').textContent=banned;
  }catch(e){}
}

async function loadFlagged(){
  const wrap=el('flagged-list');
  try{
    const q=query(collection(db,'posts'),where('reported','==',true),where('hidden','==',true));
    const snap=await getDocs(q);
    if(snap.empty){ wrap.innerHTML='<div class="empty">No flagged posts. All clear.</div>'; return; }
    const rows=snap.docs.map(d=>flaggedRow(d.id,d.data())).join('');
    wrap.innerHTML=`<table><thead><tr><th>Author</th><th>Protocol</th><th>Content</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table>`;
  }catch(e){ wrap.innerHTML='<div class="empty">Could not load. Check Firebase config.</div>'; }
}

function flaggedRow(id,d){
  return `<tr id="row-${id}">
    <td><strong style="color:var(--ink)">${esc(d.authorName)}</strong></td>
    <td style="font-size:.75rem;color:var(--gold)">${esc(d.protocol||'—')}</td>
    <td><div class="post-preview">${esc(d.body)}</div></td>
    <td><div class="action-row">
      <button class="btn btn-restore" onclick="window._admin.restorePost('${id}')">Restore</button>
      <button class="btn btn-remove" onclick="window._admin.deletePost('${esc(id)}')">Remove</button>
      <button class="btn btn-ban" onclick="window._admin.banUser('${esc(d.authorUid)}','${esc(id)}')">Ban User</button>
    </div></td>
  </tr>`;
}

async function loadAllPosts(){
  const wrap=el('all-posts-list');
  try{
    const q=query(collection(db,'posts'),where('approved','==',true),where('hidden','==',false),orderBy('createdAt','desc'));
    const snap=await getDocs(q);
    if(snap.empty){ wrap.innerHTML='<div class="empty">No posts yet.</div>'; return; }
    const rows=snap.docs.map(d=>{
      const data=d.data();
      const date=data.createdAt?.toDate?.()?.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})||'';
      return `<tr id="row-${d.id}">
        <td><strong style="color:var(--ink)">${esc(data.authorName)}</strong><div style="font-size:.72rem;color:var(--muted)">${date}</div></td>
        <td style="font-size:.75rem;color:var(--gold)">${esc(data.protocol||'—')}</td>
        <td><div class="post-preview">${esc(data.body)}</div></td>
        <td><div class="action-row"><button class="btn btn-remove" onclick="window._admin.deletePost('${esc(d.id)}')">Remove</button></div></td>
      </tr>`;
    }).join('');
    wrap.innerHTML=`<table><thead><tr><th>Author</th><th>Protocol</th><th>Content</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table>`;
  }catch(e){ wrap.innerHTML='<div class="empty">Could not load. Check Firebase config.</div>'; }
}

async function loadUsers(){
  const wrap=el('users-list');
  try{
    const snap=await getDocs(collection(db,'users'));
    if(snap.empty){ wrap.innerHTML='<div class="empty">No members yet.</div>'; return; }
    const rows=snap.docs.map(d=>{
      const u=d.data();
      const joined=u.joinedAt?.toDate?.()?.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})||'—';
      return `<tr id="user-row-${d.id}">
        <td><strong style="color:var(--ink)">${esc((u.firstName||'')+' '+(u.lastName||''))}</strong><div style="font-size:.72rem;color:var(--muted)">${esc(u.email||'')}</div></td>
        <td style="font-size:.75rem;color:var(--muted)">${joined}</td>
        <td class="passion-cell">"${esc(u.passion||'—')}"</td>
        <td>${u.banned?'<span class="badge banned">Banned</span>':'<span class="badge approved">Active</span>'}</td>
        <td><div class="action-row">
          ${u.banned
            ?`<button class="btn btn-unban" onclick="window._admin.unbanUser('${esc(d.id)}')">Unban</button>`
            :`<button class="btn btn-ban" onclick="window._admin.banUserById('${esc(d.id)}')">Ban</button>`}
        </div></td>
      </tr>`;
    }).join('');
    wrap.innerHTML=`<table><thead><tr><th>Member</th><th>Joined</th><th>Passion</th><th>Status</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table>`;
  }catch(e){ wrap.innerHTML='<div class="empty">Could not load. Check Firebase config.</div>'; }
}

async function restorePost(id){
  if(!confirm('Restore this post? It will become visible again.')) return;
  await updateDoc(doc(db,'posts',id),{hidden:false,reported:false});
  await loadAll();
}

async function deletePost(id){
  if(!confirm('Permanently remove this post?')) return;
  await updateDoc(doc(db,'posts',id),{hidden:true,approved:false,deleted:true});
  await loadAll();
}

async function banUser(uid,postId){
  if(!uid||uid==='anon') return alert('Cannot identify this user.');
  if(!confirm('Ban this user? They will not be able to post.')) return;
  await updateDoc(doc(db,'users',uid),{banned:true,bannedAt:serverTimestamp()});
  await updateDoc(doc(db,'posts',postId),{hidden:true,approved:false});
  await loadAll();
}

async function banUserById(uid){
  if(!confirm('Ban this user?')) return;
  await updateDoc(doc(db,'users',uid),{banned:true,bannedAt:serverTimestamp()});
  await loadAll();
}

async function unbanUser(uid){
  if(!confirm('Unban this user?')) return;
  await updateDoc(doc(db,'users',uid),{banned:false});
  await loadAll();
}

function v(id){return document.getElementById(id).value.trim();}
function el(id){return document.getElementById(id);}
function showErr(e,m){e.textContent=m;e.classList.add('show');}
function esc(s){
  return String(s || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// Expose to global scope for onclick attributes
window._admin = { restorePost, deletePost, banUser, banUserById, unbanUser };
Object.assign(window, { doLogin, doLogout, switchTab });
</script>
<script src="meridian-turnstile.js"></script>
</body>
</html>
