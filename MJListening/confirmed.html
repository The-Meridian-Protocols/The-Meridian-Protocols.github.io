<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>M.J.'s Listening Sessions — You're on the list</title>
<meta name="description" content="Founding list confirmation — M.J.'s Listening Sessions, Tulsa.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --room: #12161a;         
    --room-deep: #0a0d10;    
    --lamp: #e4e7eb;         
    --lamp-dim: #7c8691;     
    --card: #171d24;         
    --gold: #bfa373;         
    --rule: #222a33;         
    --card-rule: #29333e;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--room);
    color:var(--lamp);
    font-family:'Montserrat', sans-serif;
    font-size:1.02rem;
    font-weight: 300;
    line-height:1.75;
    -webkit-font-smoothing:antialiased;
  }
  .confirm{
    min-height:100vh;
    min-height:100svh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:24px;
    position:relative;
    overflow:hidden;
  }
  .groove{
    position:absolute;
    left:50%;top:50%;
    transform:translate(-50%,-50%);
    width:620px;height:620px;
    opacity:.15;
    pointer-events:none;
  }
  .confirm-card{
    position:relative;z-index:1;
    background:var(--room-deep);
    border: 1px solid var(--rule);
    padding:3rem 2.5rem;
    max-width:480px;
    width:100%;
    box-shadow: 0 30px 70px -20px rgba(0,0,0,0.8);
  }
  .confirm-card .call-no{
    font-family:'Montserrat', sans-serif;
    font-size:.65rem;letter-spacing:.25em;
    color:var(--gold);
    display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;
    border-bottom:1px solid var(--rule);
    padding-bottom:1.2rem;
    margin-bottom:2rem;
    text-align:left;
  }
  .confirm-card h1{
    font-family:'Syne', sans-serif;
    font-weight:800;
    font-size:clamp(1.8rem, 6vw, 2.4rem);
    color:var(--lamp);
    line-height:1.1;
    margin-bottom:1rem;
    text-transform: uppercase;
    letter-spacing: -0.02em;
  }
  .confirm-card p{
    font-size:0.95rem;
    color:var(--lamp-dim);
    max-width:36ch;
    margin:0 auto;
    line-height: 1.7;
  }
  .stamp{
    display:inline-block;
    font-family:'Montserrat', sans-serif;
    font-size:.6rem;font-weight:500;letter-spacing:.25em;text-transform:uppercase;
    color:var(--gold);
    border:1px solid var(--gold);
    padding:.3rem .9rem;
    margin-top:2rem;
  }
  .btn{
    display:inline-block;
    margin-top:2.5rem;
    background: var(--gold);
    color:var(--room-deep);
    text-decoration:none;
    font-family:'Montserrat', sans-serif;
    font-size:.7rem;font-weight:500;
    letter-spacing:.3em;text-transform:uppercase;
    padding:1.1rem 2.2rem;
    border:1px solid var(--gold);
    cursor:pointer;
    transition: all .3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .btn:hover{background:transparent; color: var(--gold); transform: translateY(-2px);}
  .btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

  @media (max-width:640px){
    .confirm-card{padding:2rem 1.5rem}
    .groove{width:440px;height:440px;}
  }
</style>
</head>
<body>
<main class="confirm">
  <svg class="groove" viewBox="0 0 640 640" aria-hidden="true">
    <g fill="none" stroke="#222a33" stroke-width="1">
      <circle cx="320" cy="320" r="60"/><circle cx="320" cy="320" r="90"/>
      <circle cx="320" cy="320" r="120"/><circle cx="320" cy="320" r="150"/>
      <circle cx="320" cy="320" r="180"/><circle cx="320" cy="320" r="210"/>
      <circle cx="320" cy="320" r="240"/><circle cx="320" cy="320" r="270"/>
      <circle cx="320" cy="320" r="300"/>
    </g>
    <circle cx="320" cy="320" r="26" fill="#0a0d10"/>
    <circle cx="320" cy="320" r="3.5" fill="#bfa373"/>
  </svg>

  <div class="confirm-card">
    <div class="call-no">
      <span>M.J.'S LISTENING SESSIONS</span>
      <span>FOUNDING LIST</span>
    </div>
    <h1>You're on the list.</h1>
    <p>Welcome to the first chapter. You'll hear about sessions before anyone else — and you'll be first through the door when the Lounge opens.</p>
    <div><span class="stamp">Founding member</span></div>
    <a class="btn" href="index.html">Back to the sessions</a>
  </div>
</main>
</body>
</html>
