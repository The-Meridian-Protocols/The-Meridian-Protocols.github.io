<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Sleek Dark Background -->
  <rect width="512" height="512" rx="110" fill="#0a0d10"/>
  
  <!-- The Vinyl Record Outer Rim -->
  <circle cx="236" cy="276" r="190" fill="#12161a" stroke="#bfa373" stroke-width="3" opacity="0.15"/>
  <circle cx="236" cy="276" r="180" fill="#12161a" stroke="#bfa373" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Sound Grooves -->
  <circle cx="236" cy="276" r="150" fill="none" stroke="#bfa373" stroke-width="1" opacity="0.4"/>
  <circle cx="236" cy="276" r="125" fill="none" stroke="#bfa373" stroke-width="1" opacity="0.5"/>
  <circle cx="236" cy="276" r="100" fill="none" stroke="#bfa373" stroke-width="1" opacity="0.4"/>
  
  <!-- Record Center Label -->
  <circle cx="236" cy="276" r="65" fill="#171d24" stroke="#bfa373" stroke-width="2.5"/>
  <circle cx="236" cy="276" r="10" fill="#0a0d10" stroke="#bfa373" stroke-width="1.5"/>
  
  <!-- Minimalist Turntable Tonearm / Stylus Dropping In -->
  <path d="M410 80 L410 210 L280 265" fill="none" stroke="#bfa373" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Tonearm Pivot Base -->
  <circle cx="410" cy="80" r="24" fill="#12161a" stroke="#bfa373" stroke-width="2"/>
  <circle cx="410" cy="80" r="8" fill="#bfa373"/>
  <!-- Cartridge/Stylus head -->
  <polygon points="280,255 265,270 275,280 290,265" fill="#bfa373"/>
</svg>
